
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Landscape Before & After Slider</title>
<style>
  body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
    margin:0;
  }

  .comparison-slider{
    position:relative;
    width:900px;
    height:500px;
    overflow:hidden;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.2);
  }

  .comparison-slider img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    top:0;
    left:0;
  }

  .after-wrapper{
    position:absolute;
    width:50%;
    height:100%;
    overflow:hidden;
    top:0;
    left:0;
  }

  .slider{
    position:absolute;
    width:100%;
    bottom:20px;
    left:0;
    z-index:10;
  }
</style>
</head>
<body>

<div class="comparison-slider">
  <img src="before-landscapeiv class="after-wrapper" id="afterWrapper">
    <img src="after-landscapeiv>

  <input type="range" min="0" max="100" value="50" class="slider" id="slider">
</div>

<script>
const slider = document.getElementById("slider");
const afterWrapper = document.getElementById("afterWrapper");

slider.addEventListener("input", () => {
  afterWrapper.style.width = slider.value + "%";
});
</script>

</body>
</html>
